<form class="lead-form" [formGroup]="form" (ngSubmit)="submit()">
  <div class="field-grid">
    <label>
      Імʼя
      <input type="text" formControlName="name" placeholder="Імʼя / компанія" />
    </label>

    <label>
      Контакт
      <input type="text" formControlName="contact" placeholder="Telegram, email або LinkedIn" />
    </label>
  </div>

  <div class="field-grid">
    <label>
      Послуга
      <select formControlName="service">
        <option>Frontend / Full-stack розробка</option>
        <option>Angular архітектура</option>
        <option>Міграція legacy</option>
        <option>Performance audit</option>
        <option>Підсилення команди / code review</option>
        <option>Технічна консультація</option>
      </select>
    </label>

    <label>
      Бюджет
      <select formControlName="budget">
        <option>Поки не визначено</option>
        <option>До $500</option>
        <option>$500 — $1500</option>
        <option>$1500 — $3000</option>
        <option>$3000+</option>
      </select>
    </label>
  </div>

  <label>
    Терміни
    <select formControlName="timeline">
      <option>Гнучко</option>
      <option>Цього тижня</option>
      <option>1—2 тижні</option>
      <option>Цього місяця</option>
      <option>Довгострокова співпраця</option>
    </select>
  </label>

  <label>
    Контекст проєкту
    <textarea formControlName="message" rows="5" placeholder="Розкажіть, що потрібно створити, виправити або покращити"></textarea>
  </label>

  @if (isSent) {
    <p class="success">Заявку надіслано. Я відповім найближчим часом.</p>
  }

  @if (error) {
    <p class="error">{{ error }}</p>
  }

  <button type="submit" [disabled]="isSubmitting">
    {{ isSubmitting ? 'Надсилаю...' : 'Надіслати заявку' }}
  </button>
</form>
